[DIY_ESP32S3_N16R8_E22_Back2back]
extends = esp32_base
board = diy_esp32s3_n16r8_e22_back2back
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/diy_esp32s3_n16r8_e22_back2back
  -D DIY_ESP32S3_N16R8_E22_Back2back
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D P_LORA_DIO_1=14
  -D P_LORA_NSS=46
  -D P_LORA_RESET=12
  -D P_LORA_BUSY=13
  -D P_LORA_SCLK=9
  -D P_LORA_MISO=11
  -D P_LORA_MOSI=10
  -D SX126X_TXEN=47
  -D SX126X_RXEN=48
  -D LORA_TX_POWER=7 ; configured as 7dbm, because the final output will be ~27dbm (~0.5w) if the PA is enabled.
  -D MAX_LORA_TX_POWER=19 ; max output without burning out the PA
  -D P_LORA_TX_LED=2 ; free pin (led TX)
  -D PIN_BOARD_SDA=5
  -D PIN_BOARD_SCL=4
  -D PIN_USER_BTN=1 ;  free pin (none Button key)
  -D PIN_GPS_RX=3 ; free pin (none GPS)
  -D PIN_GPS_TX=8 ; free pin (none GPS)
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/diy_esp32s3_n16r8_e22_back2back>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}

[env:DIY_ESP32S3_N16R8_E22_Back2back_repeater]
extends = DIY_ESP32S3_N16R8_E22_Back2back
build_flags =
  ${DIY_ESP32S3_N16R8_E22_Back2back.build_flags}
  -D ADVERT_NAME='"DIY ESP32S3 N16R8 E22 Back2back Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${DIY_ESP32S3_N16R8_E22_Back2back.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${DIY_ESP32S3_N16R8_E22_Back2back.lib_deps}
  ${esp32_ota.lib_deps}

