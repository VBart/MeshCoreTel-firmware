[env:DIY_ESP32S3_N16R8_E22_Back2back_companion_radio_usb]
extends = DIY_ESP32S3_N16R8_E22_Back2back
build_flags =
  ${DIY_ESP32S3_N16R8_E22_Back2back.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${DIY_ESP32S3_N16R8_E22_Back2back.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${DIY_ESP32S3_N16R8_E22_Back2back.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:DIY_ESP32S3_N16R8_E22_Back2back_companion_radio_ble]
extends = DIY_ESP32S3_N16R8_E22_Back2back
build_flags =
  ${DIY_ESP32S3_N16R8_E22_Back2back.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${DIY_ESP32S3_N16R8_E22_Back2back.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${DIY_ESP32S3_N16R8_E22_Back2back.lib_deps}
  densaugeo/base64 @ ~1.4.0

